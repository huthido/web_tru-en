# Full-stack compose file — works locally and on Coolify.
# Coolify deploy: import this file as a "Docker Compose" application.
#
# Env vars: khai báo `KEY: ${KEY}` trong `environment` của từng service —
# đây là cách CHUẨN của Coolify. Coolify đọc compose, tự tạo entry trong tab
# Environment Variables cho mỗi ${} → bạn chỉ việc điền giá trị. KHÔNG dùng
# `env_file` (Coolify không nạp file .env tự do → biến sẽ rỗng sau rebuild).
#
# Networks: KHÔNG tự khai báo `networks:` — để Coolify dùng network mặc định
# của nó (coolify-proxy nằm sẵn ở đó). Tự khai báo network khiến container ở
# 2 network, Traefik dial nhầm IP → 504 Gateway Timeout.

services:
  garage:
    # Garage = self-hosted S3-compatible object storage (deuxfleurs.fr).
    # On first boot you must run `docker exec <garage> /garage layout assign ...`
    # then `/garage bucket create web-truyen` + `/garage key new --name app` to
    # obtain S3_ACCESS_KEY / S3_SECRET_KEY. See docs/DEPLOY_COOLIFY.md.
    #
    # Build custom image to bake garage.toml in — Coolify relative bind mounts
    # of single files fail unpredictably ("IO error: Is a directory"). Override
    # rpc_secret / admin_token at runtime via env (GARAGE_RPC_SECRET, etc.).
    build:
      context: .
      dockerfile: garage/Dockerfile
    image: web-truyen-garage:latest
    container_name: web_truyen_garage
    restart: unless-stopped
    environment:
      RUST_LOG: garage=info
      # Override placeholder secrets baked in garage.toml. Set 3 biến này trong
      # Coolify (sinh bằng `openssl rand -hex 32`); bỏ trống = dùng placeholder.
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:-}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-}
      GARAGE_METRICS_TOKEN: ${GARAGE_METRICS_TOKEN:-}
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    # S3 API + Admin internal-only; backend gọi qua http://garage:3900.
    # Port web (3902) cần Coolify map sang cdn.yourdomain.com để serve static.
    expose:
      - "3900"  # S3 API (internal)
      - "3902"  # Static website (Traefik route)
      - "3903"  # Admin API (internal, bootstrap qua docker exec)
    # Garage admin API có /health endpoint. Image debian-slim đã cài wget.
    # Lưu ý: /health chỉ trả 200 sau khi đã `garage layout apply`.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3903/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: web_truyen_meilisearch
    restart: unless-stopped
    environment:
      # MEILI_MASTER_KEY dùng CHUNG giữa service này và backend — set 1 lần.
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: ${MEILI_ENV:-production}
      MEILI_NO_ANALYTICS: 'true'
    volumes:
      - meili_data:/meili_data
    expose:
      - "7700"
    # Image meilisearch (alpine) có sẵn curl — probe /health.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7700/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: web_truyen_redis
    restart: unless-stopped
    # noeviction: BullMQ requires it (queue keys không được evict khi đầy RAM
    # → tránh mất email/notification jobs).
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    expose:
      - "6379"

  postgres:
    image: postgres:18-alpine
    container_name: web_truyen_postgres
    restart: unless-stopped
    # password_encryption=md5 — Postgres 14+ mặc định scram-sha-256, nhưng
    # PgBouncer (edoburu image) connect dễ hơn với md5 + AUTH_TYPE=trust.
    # An toàn vì Postgres chỉ expose Docker internal network.
    # PG18 lưu data ở /var/lib/postgresql/18/docker — KHÔNG đọc được volume PG16.
    command: ["postgres", "-c", "password_encryption=md5"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-web_truyen_db}
      # initdb: pg_hba.conf yêu cầu md5 cho host connections.
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    expose:
      - "5432"
    volumes:
      # PG18+ mount ở /var/lib/postgresql (cha) — KHÔNG /data như PG≤17.
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-web_truyen_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    # Connection pooler trước Postgres — multiplex connection khi scale backend.
    # backend connect tới pgbouncer:5432, pgbouncer giữ pool nhỏ tới Postgres.
    image: edoburu/pgbouncer:v1.23.1-p0
    container_name: web_truyen_pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # DATABASE_URL tối giản (không query param) — edoburu/pgbouncer auto-parse
      # vào [databases] section. Trỏ thẳng postgres:5432.
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-web_truyen_db}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      # AUTH_TYPE trust — PgBouncer chỉ nghe internal Docker network.
      AUTH_TYPE: trust
    expose:
      - "5432"
    # edoburu/pgbouncer (alpine) có sẵn psql — probe bằng cách connect QUA
    # pgbouncer tới DB thật. ${POSTGRES_*} được Compose nội suy lúc build config.
    healthcheck:
      test: ["CMD-SHELL", "psql -w -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-web_truyen_db} -tAc 'SELECT 1' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    image: web-truyen-backend:latest
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: web_truyen_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started  # edoburu image không có healthcheck tool
      redis:
        condition: service_healthy
    # Mọi biến container cần đều khai báo `KEY: ${KEY}` ở đây — Coolify tự tạo
    # entry trong tab Environment Variables cho từng ${}, bạn điền giá trị.
    # DATABASE_URL → PgBouncer (pool, runtime). DIRECT_URL → Postgres trực tiếp
    # (prisma migrate). Xem .env.example để biết format.
    environment:
      NODE_ENV: production
      PORT: 3009
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      FRONTEND_URL: ${FRONTEND_URL}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-garage}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-web-truyen}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      # OAuth — callback URL phải tuyệt đối, khớp "Authorized redirect URI"
      # khai báo ở Google Cloud Console / Facebook App.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
      FACEBOOK_CALLBACK_URL: ${FACEBOOK_CALLBACK_URL}
      DONATION_PLATFORM_FEE_PERCENT: ${DONATION_PLATFORM_FEE_PERCENT:-2}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET}
      VNPAY_PAY_URL: ${VNPAY_PAY_URL}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL}
      VNPAY_IPN_URL: ${VNPAY_IPN_URL}
      MEILI_HOST: ${MEILI_HOST:-http://meilisearch:7700}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      # SMTP — cần để gửi email xác thực tài khoản & đặt lại mật khẩu.
      # Chưa set thì backend chỉ log link ra console, không gửi email thật.
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
    ports:
      - "${BACKEND_PORT:-3009}:3009"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3009/api/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      # 120s vì lần deploy đầu phải chạy `prisma migrate deploy` trên DB rỗng.
      start_period: 120s

  frontend:
    image: web-truyen-frontend:latest
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      # NEXT_PUBLIC_* phải là build arg — Next.js inline vào client bundle.
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_CDN_HOST: ${NEXT_PUBLIC_CDN_HOST:-}
    container_name: web_truyen_frontend
    restart: unless-stopped
    depends_on:
      backend:
        # service_started — Next.js standalone không gọi backend ở startup.
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_CDN_HOST: ${NEXT_PUBLIC_CDN_HOST:-}
      # SSR gọi backend qua Docker network nội bộ — tránh self-signed cert /
      # pending Let's Encrypt ở public HTTPS Traefik.
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:3009}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
  garage_meta:
    driver: local
  garage_data:
    driver: local
  redis_data:
    driver: local
  meili_data:
    driver: local
