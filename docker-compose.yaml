# Full-stack compose file — works locally and on Coolify.
# Coolify deploy: import this file as a "Docker Compose" application.
# All sensitive values come from environment variables (Coolify "Secrets" UI).

services:
  garage:
    # Garage = self-hosted S3-compatible object storage (deuxfleurs.fr).
    # On first boot you must run `docker exec web_truyen_garage /garage layout assign ...`
    # then `/garage bucket create web-truyen` + `/garage key new --name app` to obtain
    # S3_ACCESS_KEY / S3_SECRET_KEY. See docs/DEPLOY_COOLIFY.md.
    #
    # Build custom image to bake garage.toml in — Coolify relative bind mounts
    # of single files fail unpredictably ("IO error: Is a directory"). Override
    # rpc_secret / admin_token at runtime via env (GARAGE_RPC_SECRET, etc.).
    build:
      context: .
      dockerfile: garage/Dockerfile
    image: web-truyen-garage:latest
    container_name: web_truyen_garage
    restart: unless-stopped
    environment:
      RUST_LOG: garage=info
      # Override placeholder secrets baked in garage.toml at runtime.
      # Set GARAGE_RPC_SECRET / GARAGE_ADMIN_TOKEN / GARAGE_METRICS_TOKEN
      # in Coolify env (sinh bằng `openssl rand -hex 32`).
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:-}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-}
      GARAGE_METRICS_TOKEN: ${GARAGE_METRICS_TOKEN:-}
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    # S3 API + Admin internal-only; backend gọi qua http://garage:3900.
    # Chỉ port web (3902) cần Coolify map sang cdn.yourdomain.com để serve
    # static file public (ảnh truyện/avatar). Coolify tự route qua Traefik
    # — không cần `ports:` ở compose nếu đã set Domain cho service.
    expose:
      - "3900"  # S3 API (internal)
      - "3902"  # Static website (Traefik route)
      - "3903"  # Admin API (internal, bootstrap qua docker exec)
    networks:
      - web_truyen

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: web_truyen_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-changeMePleaseInProduction32chars}
      MEILI_ENV: ${MEILI_ENV:-production}
      MEILI_NO_ANALYTICS: 'true'
    volumes:
      - meili_data:/meili_data
    # Internal-only — backend reaches it via http://meilisearch:7700 (Docker
    # network). Expose to host only if admin needs the dashboard locally:
    #   ports: ["${MEILI_PORT:-7700}:7700"]
    expose:
      - "7700"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7700/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - web_truyen

  redis:
    image: redis:7-alpine
    container_name: web_truyen_redis
    restart: unless-stopped
    # noeviction: BullMQ requires it (queue keys không được evict khi đầy RAM
    # → tránh mất email/notification jobs). Nếu Redis chạm 256mb, push thêm
    # sẽ fail → BullMQ tự retry hợp lý hơn là mất silently.
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    # Internal-only — backend/BullMQ reach via redis://redis:6379. Expose to
    # host only for local dev: `ports: ["${REDIS_PORT:-6379}:6379"]`.
    expose:
      - "6379"
    networks:
      - web_truyen

  postgres:
    image: postgres:16-alpine
    container_name: web_truyen_postgres
    restart: unless-stopped
    # password_encryption=md5 — Postgres 16 mặc định scram-sha-256, nhưng
    # PgBouncer (edoburu image) cần auth_user+auth_query để xử lý SCRAM —
    # phức tạp. md5 đơn giản hơn, PgBouncer connect được luôn với
    # AUTH_TYPE=trust + password trong DATABASE_URL.
    # An toàn vì Postgres chỉ expose Docker internal network.
    command: ["postgres", "-c", "password_encryption=md5"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-web_truyen_db}
      # initdb: pg_hba.conf yêu cầu md5 cho host connections.
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    # Internal-only — backend reaches via postgres:5432 (or pgbouncer:5432).
    # Coolify host thường đã có Postgres khác chiếm 5432 → expose ra host gây
    # conflict. Local dev: thêm `ports: ["${POSTGRES_PORT:-5432}:5432"]`.
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-web_truyen_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web_truyen

  pgbouncer:
    # Connection pooler in front of Postgres. The backend's Prisma client
    # opens a connection per worker; when we scale the backend horizontally
    # (Coolify replicas), the total connection count can hit Postgres'
    # max_connections (100 by default) very fast. PgBouncer multiplexes
    # them transparently — backend connects to PgBouncer, PgBouncer holds
    # a small persistent pool to Postgres.
    #
    # Optional: backend works without PgBouncer (point DATABASE_URL directly
    # at postgres:5432). Enable by pointing DATABASE_URL at pgbouncer:6432.
    image: edoburu/pgbouncer:v1.23.1-p0
    container_name: web_truyen_pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Dùng DATABASE_URL tối giản — edoburu/pgbouncer auto-parse vào [databases]
      # section, tránh DB_NAME chứa ký tự đặc biệt làm hỏng pgbouncer.ini.
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-web_truyen_db}
      # transaction pooling = best for Prisma.
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      # AUTH_TYPE: trust — PgBouncer chỉ nghe internal Docker network
      # (expose only). Backend vẫn gửi password trong DATABASE_URL và PgBouncer
      # forward sang Postgres để verify. Tránh AUTH_TYPE: plain vì cần
      # userlist.txt sinh sai format ở Alpine image.
      AUTH_TYPE: trust
    # Internal-only — backend reaches via pgbouncer:5432. Local dev psql:
    # `ports: ["${PGBOUNCER_PORT:-6432}:5432"]`.
    expose:
      - "5432"
    # No healthcheck: edoburu/pgbouncer Alpine image không có psql/pg_isready/nc.
    # PgBouncer start <1s; backend retry connection nếu gặp transient failure
    # qua Prisma's retry. depends_on dùng service_started thay vì service_healthy.
    networks:
      - web_truyen

  backend:
    image: web-truyen-backend:latest
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: web_truyen_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started  # edoburu image không có healthcheck tool
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3009
      # Prisma Client → PgBouncer (multiplex). Prisma Migrate → Postgres
      # direct (DDL không qua transaction pooler). Postgres dùng md5
      # encryption (xem postgres service) nên PgBouncer auth trust connect
      # được.
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@pgbouncer:5432/web_truyen_db?schema=public&pgbouncer=true&connection_limit=20}
      DIRECT_URL: ${DIRECT_URL:-postgresql://user:password@postgres:5432/web_truyen_db?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      FRONTEND_URL: ${FRONTEND_URL}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-garage}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-web-truyen}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
      DONATION_PLATFORM_FEE_PERCENT: ${DONATION_PLATFORM_FEE_PERCENT:-2}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET}
      VNPAY_PAY_URL: ${VNPAY_PAY_URL}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL}
      VNPAY_IPN_URL: ${VNPAY_IPN_URL}
      MEILI_HOST: ${MEILI_HOST:-http://meilisearch:7700}
      MEILI_API_KEY: ${MEILI_MASTER_KEY:-changeMePleaseInProduction32chars}
    ports:
      - "${BACKEND_PORT:-3009}:3009"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3009/api/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      # 120s start_period vì lần deploy đầu phải chạy `prisma migrate deploy`
      # cho 17 migration trên DB rỗng — có thể mất 30-60s.
      start_period: 120s
    networks:
      - web_truyen

  frontend:
    image: web-truyen-frontend:latest
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: web_truyen_frontend
    restart: unless-stopped
    depends_on:
      backend:
        # service_started thay vì service_healthy — Next.js standalone không
        # gọi backend ở startup (chỉ runtime); và Coolify timeout khi chờ
        # backend health đôi khi false-positive nếu migration chậm.
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      # SSR (server-settings, etc.) call backend qua Docker network nội bộ.
      # Tránh self-signed cert / pending Let's Encrypt ở public HTTPS Traefik.
      # Client browser vẫn dùng NEXT_PUBLIC_API_URL public.
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:3009}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - web_truyen

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
  garage_meta:
    driver: local
  garage_data:
    driver: local
  redis_data:
    driver: local
  meili_data:
    driver: local

networks:
  web_truyen:
    driver: bridge
