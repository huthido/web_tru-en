# Single-node Garage config for dev / small prod.
# For multi-node clusters see https://garagehq.deuxfleurs.fr/documentation/

metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"

# Generate fresh secrets with: openssl rand -hex 32
db_engine = "sqlite"

replication_mode = "none"

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"
rpc_secret = "REPLACE_WITH_OPENSSL_RAND_HEX_32"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.garage.local"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".web.garage.local"
index = "index.html"

[admin]
api_bind_addr = "[::]:3903"
admin_token = "REPLACE_WITH_OPENSSL_RAND_HEX_32"
metrics_token = "REPLACE_WITH_OPENSSL_RAND_HEX_32"
